name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .[dev]
      - name: Syntax check
        run: python -m py_compile api.py batch.py evaluate_locked.py evaluation.py preprocessing.py train.py src/*.py tests/*.py
      - name: Unit tests
        run: python -m pytest
