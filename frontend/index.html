<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Credit Risk Review</title>
  <style>
    :root { color-scheme: light; font-family: Arial, sans-serif; }
    body { margin: 0; background: #f6f7f9; color: #18212f; }
    main { max-width: 920px; margin: 0 auto; padding: 32px 18px; }
    h1 { font-size: 30px; margin: 0 0 6px; }
    p { margin: 0 0 22px; color: #526071; }
    form { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
    label { display: grid; gap: 6px; font-size: 14px; font-weight: 700; }
    input { border: 1px solid #b9c1cc; border-radius: 6px; padding: 10px 11px; font-size: 16px; background: white; }
    button { justify-self: start; margin-top: 18px; border: 0; border-radius: 6px; padding: 11px 16px; background: #0f766e; color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
    output { display: block; margin-top: 22px; padding: 16px; border-left: 4px solid #0f766e; background: white; min-height: 48px; }
    .wide { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <main>
    <h1>Credit Risk Review</h1>
    <p>Limited-field risk estimate using accepted-loan outcomes projected onto rejected-application-style inputs.</p>
    <form id="score-form">
      <label>Amount Requested <input name="amount_requested" type="number" min="1" step="100" required></label>
      <label>Risk Score <input name="risk_score" type="number" min="300" max="900" required></label>
      <label>Debt-to-Income % <input name="dti" type="number" min="0" step="0.01" required></label>
      <label>ZIP Code <input name="zip_code" minlength="3" required></label>
      <label>State <input name="state" minlength="2" maxlength="2" required></label>
      <label>Employment Length <input name="employment_length" required></label>
      <label>Funded Amount <input name="funded_amnt" type="number" min="1" step="100"></label>
      <label>Term Months <input name="term_months" type="number" min="1" step="1"></label>
      <label>Installment <input name="installment" type="number" min="1" step="0.01"></label>
      <div class="wide"><button type="submit">Score</button></div>
    </form>
    <output id="result">No score yet.</output>
  </main>
  <script>
    const form = document.querySelector("#score-form");
    const result = document.querySelector("#result");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      for (const key of Object.keys(data)) {
        if (data[key] === "") delete data[key];
        else if (!Number.isNaN(Number(data[key])) && key !== "zip_code" && key !== "state" && key !== "employment_length") data[key] = Number(data[key]);
      }
      const response = await fetch("/score/rejected-risk", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      const body = await response.json();
      if (!response.ok) {
        result.textContent = body.detail || "Scoring failed.";
        return;
      }
      const pct = (body.p_default * 100).toFixed(1);
      const profit = body.expected_profit == null ? "" : ` Scenario expected profit: $${body.expected_profit.toFixed(2)}.`;
      const note = body.model_note ? ` ${body.model_note}.` : "";
      result.textContent = `Review result: ${body.decision}. Default risk: ${pct}%. ${body.reason}.${profit}${note}`;
    });
  </script>
</body>
</html>
