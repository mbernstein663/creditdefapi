<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Default Risk Demo</title>
  <style>
    :root {
      --ink: #15202b;
      --muted: #5c6773;
      --paper: #f5efe3;
      --card: #fffaf3;
      --line: #d8cdbd;
      --accent: #c44f2d;
      --accent-dark: #8d361c;
      font-family: Arial, Helvetica, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(196,79,45,0.18), transparent 32%),
        linear-gradient(180deg, #f8f2e9 0%, #efe4d2 100%);
      min-height: 100vh;
    }
    main { max-width: 960px; margin: 0 auto; padding: 40px 18px 56px; }
    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 28px;
      padding: 24px;
      border: 1px solid rgba(21,32,43,0.08);
      background: rgba(255,250,243,0.86);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 40px rgba(72,52,38,0.08);
    }
    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3.3rem); line-height: 0.95; }
    .lede { margin: 0; max-width: 62ch; color: var(--muted); font-size: 1.03rem; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      padding: 6px 10px;
      font-size: 0.9rem;
      overflow-wrap: anywhere;
    }
    .layout { display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr); gap: 20px; }
    .panel {
      border: 1px solid rgba(21,32,43,0.09);
      background: var(--card);
      box-shadow: 0 14px 30px rgba(72,52,38,0.07);
    }
    form { padding: 22px; display: grid; gap: 16px; }
    .fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
    label { display: grid; gap: 6px; font-weight: 700; font-size: 0.95rem; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      padding: 12px 11px;
      font: inherit;
      background: #fffdfa;
      color: var(--ink);
    }
    button {
      border: 0;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dark); }
    .sidebar { padding: 22px; display: grid; gap: 18px; }
    .result {
      padding: 18px;
      border-left: 4px solid var(--accent);
      background: rgba(196,79,45,0.08);
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 0;
    }
    .big { font-size: 2rem; font-weight: 700; }
    .small { color: var(--muted); }
    @media (max-width: 760px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Default Risk Evaluation</h1>
      <p class="lede">This page uses a reduced five-input model trained on application-time attributes from the main accepted-loan default model.</p>
      <div class="meta">
        <span class="pill" id="model-pill">Loading model metadata...</span>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <form id="score-form">
          <div class="fields" id="fields"></div>
          <button type="submit">Predict Default Risk</button>
        </form>
      </div>

      <aside class="panel sidebar">
        <div class="result" id="result" aria-live="polite">
          <div class="big">No score yet</div>
          <div class="small">The API will return calibrated default probability and risk band.</div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const labelMap = {
      loan_amnt: "Loan Amount",
      int_rate: "Interest Rate (%)",
      annual_inc: "Annual Income",
      dti: "Debt-to-Income Ratio",
      fico_range_low: "FICO Low",
      fico_range_high: "FICO High",
      delinq_2yrs: "Delinquencies (2y)",
      inq_last_6mths: "Inquiries (6m)",
      open_acc: "Open Accounts",
      pub_rec: "Public Records",
      revol_bal: "Revolving Balance",
      revol_util: "Revolving Utilization (%)",
      total_acc: "Total Accounts",
      mort_acc: "Mortgage Accounts",
      acc_open_past_24mths: "Accounts Opened (24m)",
      pub_rec_bankruptcies: "Public Record Bankruptcies",
      grade: "Grade",
      sub_grade: "Sub Grade",
      emp_length: "Employment Length",
      home_ownership: "Home Ownership",
      verification_status: "Verification Status",
      purpose: "Purpose",
      addr_state: "State",
      application_type: "Application Type",
      initial_list_status: "Initial List Status"
    };
    const optionMap = {
      grade: ["A", "B", "C", "D", "E", "F", "G"],
      sub_grade: ["A1", "A2", "B1", "B2", "C1", "C2", "D1", "D2"],
      emp_length: ["< 1 year", "1 year", "2 years", "3 years", "4 years", "5 years", "10+ years"],
      home_ownership: ["RENT", "OWN", "MORTGAGE", "OTHER"],
      verification_status: ["Not Verified", "Source Verified", "Verified"],
      purpose: ["debt_consolidation", "credit_card", "home_improvement", "major_purchase", "small_business"],
      addr_state: ["CA", "FL", "IL", "NY", "NJ", "PA", "TX"],
      application_type: ["Individual", "Joint App"],
      initial_list_status: ["w", "f"]
    };
    const numericFields = new Set([
      "loan_amnt", "int_rate", "annual_inc", "dti", "fico_range_low", "fico_range_high",
      "delinq_2yrs", "inq_last_6mths", "open_acc", "pub_rec", "revol_bal", "revol_util",
      "total_acc", "mort_acc", "acc_open_past_24mths", "pub_rec_bankruptcies"
    ]);
    const integerFields = new Set([
      "loan_amnt", "annual_inc", "fico_range_low", "fico_range_high", "delinq_2yrs",
      "inq_last_6mths", "open_acc", "pub_rec", "total_acc", "mort_acc",
      "acc_open_past_24mths", "pub_rec_bankruptcies"
    ]);

    const form = document.querySelector("#score-form");
    const fields = document.querySelector("#fields");
    const result = document.querySelector("#result");
    const modelPill = document.querySelector("#model-pill");

    function buildField(name, defaults) {
      const label = document.createElement("label");
      label.textContent = labelMap[name] || name;
      let input;
      if (optionMap[name]) {
        input = document.createElement("select");
        for (const option of optionMap[name]) {
          const node = document.createElement("option");
          node.value = option;
          node.textContent = option;
          input.appendChild(node);
        }
      } else {
        input = document.createElement("input");
        input.type = numericFields.has(name) ? "number" : "text";
        if (numericFields.has(name)) {
          input.step = name === "dti" ? "0.1" : integerFields.has(name) ? "1" : "any";
          input.min = "0";
          if (defaults[name] != null) {
            input.value = name === "dti"
              ? Number(defaults[name]).toFixed(1)
              : integerFields.has(name) ? Math.round(defaults[name]) : defaults[name];
          }
        }
      }
      input.name = name;
      input.required = true;
      label.appendChild(input);
      return label;
    }

    async function loadConfig() {
      const response = await fetch("/frontend-config");
      const body = await response.json();
      if (!response.ok) {
        modelPill.textContent = body.detail || "Frontend model unavailable";
        result.innerHTML = `<div class="big">Model unavailable</div><div class="small">${body.detail || "Train the frontend bundle first."}</div>`;
        return;
      }
      modelPill.textContent = `${body.model_type} · ${body.calibration_method} · ${body.model_version}`;
      fields.replaceChildren(...body.frontend_fields.map((name) => buildField(name, body.frontend_defaults)));
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = Object.fromEntries(new FormData(form));
      for (const [key, value] of Object.entries(payload)) {
        if (numericFields.has(key)) payload[key] = Number(value);
      }
      const response = await fetch("/score-frontend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const body = await response.json();
      if (!response.ok) {
        result.innerHTML = `<div class="big">Request failed</div><div class="small">${body.detail || "Validation error."}</div>`;
        return;
      }
      const pct = (body.p_default * 100).toFixed(1);
      result.innerHTML = `
        <div class="big">${pct}% default risk</div>
        <div><strong>Risk band:</strong> ${body.risk_band}</div>
      `;
    });

    loadConfig();
  </script>
</body>
</html>
